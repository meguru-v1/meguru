<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="description" content="AIがあなた好みの散策コースを提案する旅行プランニングアプリ。周辺の隠れた名所やカフェを組み合わせた、あなただけの特別なよりみちを見つけましょう。" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="version" content="1.2.1" />
  <script>
    // 1. Service Worker の強制解除
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (registrations) {
        for (let registration of registrations) {
          registration.unregister();
        }
      });
    }

    // 2. ブラウザキャッシュ (CacheStorage) の物理削除
    if ('caches' in window) {
      caches.keys().then(function (names) {
        for (let name of names) caches.delete(name);
      });
    }
  </script>
  <meta name="theme-color" content="#ffffff" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+JP:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet" />
  <title>Meguru - あなたのための、特別なよりみち</title>
</head>

<body>
  <!-- スプラッシュスクリーン（React マウント前に表示） -->
  <div id="splash-screen" style="
    position: fixed; inset: 0; z-index: 99999;
    background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
  ">
    <!-- 装飾的な波紋の背景 -->
    <div class="splash-ripple"></div>
    <div class="splash-ripple" style="animation-delay: 1s;"></div>
    
    <div style="text-align: center; position: relative; z-index: 10;">
      <div style="width: 160px; height: 160px; margin: 0 auto 32px; border-radius: 52px; overflow: hidden; box-shadow: 0 25px 60px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.15);">
        <img src="meguru-logo.png" style="width: 100%; height: 100%; object-fit: cover;" />
      </div>

      <!-- ロゴテキスト -->
      <div class="splash-logo" style="
        font-family: 'Playfair Display', serif;
        font-size: 56px; font-weight: 900; color: white;
        letter-spacing: -0.04em; margin-bottom: 4px;
        text-shadow: 0 4px 25px rgba(0,0,0,0.5);
      ">meguru</div>
      
      <!-- サブタイトル -->
      <div class="splash-subtitle" style="
        font-family: 'Noto Sans JP', sans-serif;
        font-size: 11px; color: rgba(255,255,255,0.5);
        letter-spacing: 0.1em; font-weight: 500;
      ">あなたのための、特別なよりみち。</div>
      
      <!-- インジケーター -->
      <div class="splash-loader" style="
        margin-top: 40px;
        display: flex; gap: 8px; justify-content: center;
        opacity: 0; animation: splash-fade-in 0.5s ease forwards 1.2s;
      ">
        <div class="splash-dot"></div>
        <div class="splash-dot" style="animation-delay: 0.2s"></div>
        <div class="splash-dot" style="animation-delay: 0.4s"></div>
      </div>
    </div>
  </div>
  <style>
    /* 波紋アニメーション */
    .splash-ripple {
      position: absolute;
      top: 50%; left: 50%;
      width: 10px; height: 10px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 1px solid rgba(245, 158, 11, 0.2);
      animation: ripple-expansion 3s linear infinite;
    }
    @keyframes ripple-expansion {
      0% { width: 0; height: 0; opacity: 1; border-width: 2px; }
      100% { width: 500px; height: 500px; opacity: 0; border-width: 0px; }
    }

    /* ロゴのフェードイン・スライド */
    .splash-logo {
      opacity: 0;
      transform: translateY(20px);
      animation: splash-fade-up 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 0.3s;
    }
    .splash-subtitle {
      opacity: 0;
      transform: translateY(15px);
      animation: splash-fade-up 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 0.6s;
    }
    @keyframes splash-fade-up {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ロードインジケーター */
    .splash-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background-color: #f59e0b;
      animation: splash-bounce 1s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes splash-bounce {
      from { transform: translateY(0) scale(1); opacity: 0.5; }
      to { transform: translateY(-6px) scale(1.2); opacity: 1; box-shadow: 0 0 10px rgba(245, 158, 11, 0.5); }
    }
    @keyframes splash-fade-in {
      to { opacity: 1; }
    }
  </style>
  <div id="root"></div>
  <script>
    // スプラッシュを消す共通関数
    function dismissSplash() {
      const splash = document.getElementById('splash-screen');
      if (splash && !splash.dataset.dismissed) {
        splash.dataset.dismissed = 'true';
        splash.style.opacity = '0';
        splash.style.transform = 'scale(1.05)';
        setTimeout(function() { splash.remove(); }, 600);
      }
    }

    // React マウント検知 or 最大3.5秒で必ず消す
    setTimeout(dismissSplash, 3500);

    const observer = new MutationObserver(function() {
      const root = document.getElementById('root');
      if (root && root.children.length > 0) {
        observer.disconnect();
        // 最低1.5秒はアニメーションを見せるための意図的遅延
        setTimeout(dismissSplash, 1500);
      }
    });
    const rootEl = document.getElementById('root');
    if (rootEl) {
        observer.observe(rootEl, { childList: true });
    }
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
