<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/meguru/favicon.ico" />
  <link rel="apple-touch-icon" href="/meguru/apple-touch-icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="version" content="1.0.3" />
  <script>
    // 1. Service Worker の解除
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (registrations) {
        for (let registration of registrations) {
          registration.unregister();
        }
      });
    }

    // 2. ブラウザキャッシュ (CacheStorage) の物理削除
    if ('caches' in window) {
      caches.keys().then(function (names) {
        for (let name of names) caches.delete(name);
      });
    }

    // 3. バージョンチェックによる強制リロード
    const LATEST_V = '1.0.3';
    if (localStorage.getItem('meguru_app_version') !== LATEST_V) {
      localStorage.setItem('meguru_app_version', LATEST_V);
      // クエリパラメータを付けて強制的にサーバーから取得させる
      const url = new URL(window.location.href);
      url.searchParams.set('cache_bust', Date.now());
      window.location.replace(url.toString());
    }
  </script>
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+JP:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet" />
  <title>Meguru - あなたのための、特別なよりみち</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
