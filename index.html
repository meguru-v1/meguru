<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/meguru/favicon.ico" />
  <link rel="apple-touch-icon" href="/meguru/apple-touch-icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="version" content="1.0.1" />
  <script>
    // 過去の Service Worker が残っている場合に強制解除する
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (registrations) {
        for (let registration of registrations) {
          registration.unregister();
          console.log('Old Service Worker unregistered');
        }
        // SWを解除した後にページが古い可能性を考え、一回だけリロードを検討（必要に応じて）
      });
    }

    // クエリパラメータなしでアクセスされた場合、タイムスタンプを付けてリロードしてキャッシュを破る方法も検討できるが、
    // まずは SW の解除で様子を見る。
  </script>
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+JP:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet" />
  <title>Meguru - あなたのための、特別なよりみち</title>
</head>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
