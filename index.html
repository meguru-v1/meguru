  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/meguru/sw.js', { scope: '/meguru/' })
          .then(function(reg) { console.log('[SW] Registered:', reg.scope); })
          .catch(function(err) { console.warn('[SW] Registration failed:', err); });
      });
    }
  </script>
  <meta name="theme-color" content="#faf8f5" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+JP:wght@300;400;500;600;700;800;900&family=Shippori+Mincho+B1:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <title>Meguru - あなたのための、特別なよりみち</title>
  <script type="module" crossorigin src="/meguru/assets/index-Byg83KEA.js"></script>
  <link rel="stylesheet" crossorigin href="/meguru/assets/index-BgD3YYbf.css">
</head>

<body>
  <div id="splash-screen" style="position:fixed;inset:0;z-index:99999;background:#1a1a1f;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1);overflow:hidden">
    <div style="text-align:center;position:relative;z-index:10">
      <div style="width:72px;height:72px;margin:0 auto 28px;border:2px solid rgba(196,151,47,.4);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px rgba(196,151,47,.15)">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#c4972f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>
        </svg>
      </div>
      <div id="splash-logo" style="font-family:'Shippori Mincho B1',serif;font-size:48px;font-weight:700;color:#e8e4dc;letter-spacing:.08em;margin-bottom:8px;text-shadow:0 2px 20px rgba(196,151,47,.2);opacity:0;transform:translateY(15px)">Meguru</div>
      <div id="splash-sub" style="font-family:'Noto Sans JP',sans-serif;font-size:11px;color:rgba(232,228,220,.4);letter-spacing:.15em;font-weight:400;opacity:0;transform:translateY(10px)">あなたのための、特別なよりみち。</div>
      <div style="margin:24px auto 0;width:60px;height:2px;background:linear-gradient(90deg,transparent,#c4972f,transparent);opacity:0" id="splash-brush"></div>
      <div style="margin-top:32px;display:flex;gap:10px;justify-content:center;opacity:0" id="splash-dots">
        <div style="width:5px;height:5px;border-radius:50%;background:#c4972f"></div>
        <div style="width:5px;height:5px;border-radius:50%;background:#c4972f"></div>
        <div style="width:5px;height:5px;border-radius:50%;background:#c4972f"></div>
      </div>
    </div>
  </div>
  <div id="root"></div>
  <script>
    // スプラッシュアニメーション（CSS不使用、JS制御）
    setTimeout(function(){var l=document.getElementById('splash-logo');if(l){l.style.transition='opacity 1s ease,transform 1s ease';l.style.opacity='1';l.style.transform='translateY(0)'}},300);
    setTimeout(function(){var s=document.getElementById('splash-sub');if(s){s.style.transition='opacity 1s ease,transform 1s ease';s.style.opacity='1';s.style.transform='translateY(0)'}},600);
    setTimeout(function(){var b=document.getElementById('splash-brush');if(b){b.style.transition='opacity .5s ease';b.style.opacity='1'}},900);
    setTimeout(function(){var d=document.getElementById('splash-dots');if(d){d.style.transition='opacity .5s ease';d.style.opacity='1'}},1200);

    function dismissSplash(){var s=document.getElementById('splash-screen');if(s&&!s.dataset.dismissed){s.dataset.dismissed='true';s.style.opacity='0';s.style.transform='scale(1.02)';setTimeout(function(){s.remove()},600)}}
    setTimeout(dismissSplash,3500);
    var observer=new MutationObserver(function(){var r=document.getElementById('root');if(r&&r.children.length>0){observer.disconnect();setTimeout(dismissSplash,1500)}});
    var rootEl=document.getElementById('root');if(rootEl){observer.observe(rootEl,{childList:true})}
  </script>
</body>

</html>
